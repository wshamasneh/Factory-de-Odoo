version: "3.8"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
      POSTGRES_DB: odoo_factory
    volumes:
      - factory-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo"]
      interval: 5s
      timeout: 3s
      retries: 10
    # At 90+ modules, PostgreSQL needs more resources
    shm_size: '512mb'
    command: >
      postgres
        -c shared_buffers=256MB
        -c work_mem=16MB
        -c maintenance_work_mem=128MB
        -c max_connections=100

  odoo:
    image: odoo:17.0
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${FACTORY_PORT:-8069}:8069"
    volumes:
      - factory-addons:/mnt/extra-addons
      - factory-odoo-data:/var/lib/odoo
    environment:
      HOST: db
      USER: odoo
      PASSWORD: odoo
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8069/web/health"]
      interval: 10s
      timeout: 5s
      retries: 12
    # At 90+ modules, Odoo needs more memory for module loading
    deploy:
      resources:
        limits:
          memory: 2G

volumes:
  factory-db-data:
  factory-addons:
  factory-odoo-data:
