[options]
# addons_path includes both community and enterprise paths
addons_path = /mnt/extra-addons,/mnt/enterprise-addons
data_dir = /var/lib/odoo
db_host = db
db_port = 5432
db_user = odoo
db_password = odoo
admin_passwd = admin
without_demo = all
# Set your Odoo Enterprise license key via environment variable ODOO_ENTERPRISE_CODE
# or replace the placeholder below directly (never commit real keys)
; enterprise_code = YOUR_ENTERPRISE_CODE_HERE
