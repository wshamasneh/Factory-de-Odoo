<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 280" width="700" height="280">
  <defs>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7dcfff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bb9af7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="trailGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7dcfff;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#7dcfff;stop-opacity:0.4" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:0.8" />
    </linearGradient>
  </defs>

  <!-- Speed lines — trailing streaks behind the text -->
  <line x1="40" y1="72" x2="200" y2="72" stroke="url(#accentGrad)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="80" y1="88" x2="210" y2="88" stroke="url(#accentGrad)" stroke-width="2" stroke-linecap="round"/>
  <line x1="20" y1="104" x2="210" y2="104" stroke="url(#accentGrad)" stroke-width="3" stroke-linecap="round"/>
  <line x1="100" y1="120" x2="210" y2="120" stroke="url(#accentGrad)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="60" y1="136" x2="210" y2="136" stroke="url(#accentGrad)" stroke-width="2" stroke-linecap="round"/>

  <!-- Motion ghost — faded trailing copy -->
  <text x="215" y="130" font-family="'SF Mono','Fira Code','JetBrains Mono',monospace"
        font-size="100" font-weight="900" fill="url(#trailGrad)" letter-spacing="-2"
        font-style="italic">Odoo</text>

  <!-- Main text — bold italic for speed feel -->
  <text x="235" y="130" font-family="'SF Mono','Fira Code','JetBrains Mono',monospace"
        font-size="100" font-weight="900" fill="url(#mainGrad)" letter-spacing="-2"
        font-style="italic">Odoo</text>

  <!-- Subtitle -->
  <text x="350" y="170" font-family="'SF Mono','Fira Code','JetBrains Mono',monospace"
        font-size="18" font-weight="bold" fill="#565f89" text-anchor="middle"
        letter-spacing="3">FACTORY DE ODOO</text>

  <!-- Tagline -->
  <text x="350" y="200" font-family="'SF Mono','Fira Code','JetBrains Mono',monospace"
        font-size="11" fill="#F59E0B" text-anchor="middle" opacity="0.7"
        letter-spacing="5">FAST. COHERENT. PRODUCTION-GRADE.</text>
</svg>
